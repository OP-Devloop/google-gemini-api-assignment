<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat History</title>
</head>
<body>

<h1>Saved Chat History</h1>

<table border="1">
    <thead>
    <tr>
        <th>Prompt</th>
        <th>Response</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(chatHistory)}">
        <td colspan="3">No chat history found.</td>
    </tr>

    <tr th:each="aichat : ${chatHistory}">
        <td th:text="${aichat.prompt}">Prompt</td>
        <td th:text="${aichat.response}">Response</td>
    </tr>
    </tbody>
</table>

<br>

<a th:href="@{/}">Back to Chat</a>

</body>
</html>
